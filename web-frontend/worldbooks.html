<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>世界书管理 - OpenCode AIRP</title>
<style>
:root{
  --bg:#16110e;--panel:#1f1915;--panel-2:#2a221c;--text:#e8dcc8;--muted:#a89880;
  --line:#3d3228;--gold:#d4a574;--gold-2:#c49a6c;--brand:#e8b86d;--brand-2:#3d2e1a;
  --danger:#c45c5c;--shadow:0 12px 36px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.55 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;min-height:100vh}
button,input,select,textarea{font:inherit;color:inherit}
button{touch-action:manipulation;cursor:pointer}
.top{
  display:flex;align-items:center;gap:12px;padding:14px 20px;
  background:linear-gradient(180deg, rgba(212,165,116,.08), transparent);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;backdrop-filter:blur(8px);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg, var(--gold), var(--gold-2));display:flex;align-items:center;justify-content:center;color:#1a1614;font-weight:900;font-size:14px}
.brand-text{font-weight:700;font-size:15px;color:var(--gold);letter-spacing:.3px}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px}
.spacer{flex:1}
.icon-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--text);
  display:inline-flex;align-items:center;justify-content:center;text-decoration:none;transition:all .15s;font-size:13px;
}
.icon-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--panel-2)}
.sub-nav{
  display:flex;gap:6px;padding:10px 20px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap;
}
.sub-tab{
  border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:5px 12px;
  font-size:12px;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
}
.sub-tab:hover{border-color:var(--gold);color:var(--gold)}
.sub-tab.active{background:var(--brand-2);border-color:var(--gold);color:var(--gold);font-weight:600}
.container{max-width:1200px;margin:0 auto;padding:20px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:800;color:var(--gold);letter-spacing:.3px}
.btn{
  border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:6px 12px;
  font-size:12px;display:inline-flex;align-items:center;gap:6px;transition:all .15s;
}
.btn:hover{border-color:var(--gold);color:var(--gold);background:var(--panel-2)}
.btn-primary{
  border:none;background:linear-gradient(135deg, var(--gold), var(--gold-2));color:#1a1614;border-radius:8px;
  padding:7px 14px;font-size:12px;font-weight:600;
}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-danger{border:1px solid var(--danger);background:transparent;color:var(--danger);border-radius:6px;padding:4px 10px;font-size:11px}
.btn-danger:hover{background:rgba(196,92,92,.1)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:14px}
.card-item{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:all .15s;cursor:pointer;
}
.card-item:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow)}
.card-body{padding:10px 12px}
.card-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.card-meta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-actions{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
.card-actions .btn{flex:1;justify-content:center;font-size:11px;padding:4px 8px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-desc{font-size:13px}
.modal-backdrop{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);width:min(520px,92vw);max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg, rgba(212,165,116,.06), transparent)}
.modal-title{font-size:16px;font-weight:700;color:var(--gold)}
.modal-close{margin-left:auto;width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--text);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.modal-close:hover{border-color:var(--gold);color:var(--gold)}
.modal-body{padding:18px;overflow-y:auto}
.upload-zone{border:2px dashed var(--line);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--panel-2)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--gold);background:rgba(212,165,116,.05)}
.upload-zone input{display:none}
.upload-icon{font-size:36px;color:var(--muted);margin-bottom:8px}
.upload-text{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.upload-hint{font-size:12px;color:var(--muted)}
.upload-preview{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.upload-thumb{width:60px;height:80px;border-radius:6px;border:1px solid var(--line);overflow:hidden;position:relative}
.upload-thumb img{width:100%;height:100%;object-fit:cover}
.upload-thumb .remove{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:12px 18px 16px;border-top:1px solid var(--line)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;background:var(--panel-2);color:var(--gold);border:1px solid var(--gold);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;box-shadow:var(--shadow);opacity:0;transition:opacity .2s;pointer-events:none;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;max-width:90vw}
.toast.show{opacity:1;pointer-events:auto}
.toast button{border:1px solid var(--gold);background:var(--panel);color:var(--gold);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;white-space:nowrap}
.toast button:hover{border-color:var(--gold-2);background:var(--brand-2)}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--brand-2);color:var(--gold);border:1px solid rgba(212,165,116,.2);white-space:nowrap}
.stat{font-size:11px;color:var(--muted);white-space:nowrap}
.loading{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}
.spinner{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.entry-table{width:100%;border-collapse:collapse;font-size:12px}
.entry-table th{
  text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);color:var(--muted);
  font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;
}
.entry-table td{padding:6px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
.entry-table tr:hover td{background:var(--panel-2)}
.entry-table .row-toggle{width:28px;text-align:center;cursor:pointer;color:var(--muted);transition:color .15s}
.entry-table .row-toggle:hover{color:var(--gold)}
.entry-table .row-actions{display:flex;gap:4px;justify-content:flex-end}
.entry-input{
  width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;
  padding:5px 8px;color:var(--text);font-size:12px;outline:none;
}
.entry-input:focus{border-color:var(--gold)}
.entry-select{
  width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;
  padding:5px 8px;color:var(--text);font-size:12px;outline:none;cursor:pointer;
}
.entry-select:focus{border-color:var(--gold)}
.entry-textarea{
  width:100%;min-height:60px;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;
  padding:8px;color:var(--text);font-size:12px;outline:none;resize:vertical;
}
.entry-textarea:focus{border-color:var(--gold)}
.strategy-dot{
  width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;
}
.strategy-dot.constant{background:#4ade80}
.strategy-dot.selective{background:#60a5fa}
.strategy-dot.normal{background:var(--muted)}
.depth-badge{
  display:inline-flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--line);
  border-radius:4px;padding:2px 8px;font-size:11px;color:var(--muted);white-space:nowrap;
}
.toolbar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.toolbar-title{font-size:14px;font-weight:700;color:var(--gold)}
.toolbar-meta{font-size:12px;color:var(--muted)}
.pagination{display:flex;align-items:center;gap:6px;margin-left:auto}
.pagination button{
  min-width:28px;height:28px;border-radius:6px;border:1px solid var(--line);background:var(--panel);
  color:var(--text);font-size:11px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
}
.pagination button:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination .page-info{font-size:11px;color:var(--muted);padding:0 4px}
.entry-content-preview{
  font-size:12px;color:var(--muted);padding:8px 10px;background:var(--panel);
  border-top:1px solid var(--line);white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;
}
.entry-content-preview .content-label{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div class="top">
  <div class="brand">
    <div class="brand-icon">AIRP</div>
    <div>
      <div class="brand-text">OpenCode AIRP SillyTavern</div>
      <div class="brand-sub">世界书管理</div>
    </div>
  </div>
  <span class="spacer"></span>
  <a class="icon-btn" href="/index.html" title="返回对话">&#8592;</a>
</div>
<div class="sub-nav">
  <a href="/cards.html" class="sub-tab">&#128100; 角色卡</a>
  <a href="/worldbooks.html" class="sub-tab active">&#127758; 世界书</a>
  <a href="/history.html" class="sub-tab">&#128197; 对话历史</a>
  <a href="/presets.html" class="sub-tab">&#128396; 预设</a>
  <a href="/regex.html" class="sub-tab">&#10070; 正则</a>
  <a href="/builtin-cards.html" class="sub-tab">&#128188; 内置角色卡</a>
  <a href="/builtin-presets.html" class="sub-tab">&#128295; 内置预设</a>
</div>
<div class="container">
  <div class="toolbar">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;width:100%">
      <span style="font-size:12px;color:var(--muted)">世界书</span>
      <span style="font-size:12px;color:var(--muted)" id="worldbookCount">共 0 个</span>
      <span class="spacer"></span>
      <select id="worldbookCardSelect" onchange="onWorldbookCardChange(this.value)" style="background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text);min-width:160px">
        <option value="">-- 选择角色卡 --</option>
      </select>
      <button class="btn" style="font-size:11px;padding:4px 10px" onclick="openWorldbookCreateModal()">+ 新建世界书</button>
      <button class="btn" style="font-size:11px;padding:4px 10px" onclick="openWorldbookImportModal()">导入世界书</button>
      <button class="btn" style="font-size:11px;padding:4px 10px" onclick="refreshWorldbooks()">&#8635; 刷新</button>
    </div>
  </div>
  <div id="worldbookView" style="display:none">
    <div class="toolbar-row">
      <div class="toolbar-title" id="wbTitle">main</div>
      <div class="toolbar-meta" id="wbMeta"></div>
      <span class="spacer"></span>
      <input type="text" id="entrySearch" placeholder="搜索词条..." oninput="onSearch()" style="background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text);width:160px;outline:none">
      <select id="sortSelect" onchange="onSearch()" style="background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text);outline:none">
        <option value="order">优先级 (顺序)</option>
        <option value="probability">触发概率</option>
        <option value="depth">深度</option>
      </select>
      <div class="pagination">
        <button id="prevPage" onclick="changePage(-1)">&lt;</button>
        <span class="page-info" id="pageInfo">1 / 1</span>
        <button id="nextPage" onclick="changePage(1)">&gt;</button>
        <select id="pageSize" onchange="onSearch()" style="background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text);outline:none">
          <option value="10">10 / page</option>
          <option value="25" selected>25 / page</option>
          <option value="50">50 / page</option>
          <option value="100">100 / page</option>
        </select>
      </div>
    </div>
    <div style="background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden">
      <table class="entry-table">
        <thead>
          <tr>
            <th style="width:28px"></th>
            <th style="width:28px"></th>
            <th>标题 (备注)</th>
            <th>触发策略</th>
            <th>插入位置</th>
            <th>深度</th>
            <th>顺序</th>
            <th>触发概率 %</th>
            <th style="width:90px;text-align:right">操作</th>
          </tr>
        </thead>
        <tbody id="entryTableBody"></tbody>
      </table>
    </div>
    <div id="entryEmpty" class="empty" style="display:none;padding:40px 20px">
      <div class="empty-title">暂无词条</div>
      <div class="empty-desc">该世界书还没有任何条目。</div>
    </div>
  </div>
  <div id="worldbookGrid" class="card-grid">
    <div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">&#127758;</div>
      <div class="empty-title">选择角色卡</div>
      <div class="empty-desc">请先在上方选择一个角色卡，以管理其世界书文件。</div>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="worldbookCreateBackdrop" onclick="closeWorldbookCreateModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><div class="modal-title">新建世界书</div><button class="modal-close" onclick="closeWorldbookCreateModal()">&times;</button></div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="font-size:12px;color:var(--muted)">世界书名称（无需输入 .json 后缀）</label>
        <input id="worldbookNameInput" type="text" placeholder="例如：main" style="background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);outline:none" onkeydown="if(event.key==='Enter')startWorldbookCreate()">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeWorldbookCreateModal()">取消</button>
      <button class="btn-primary" id="worldbookCreateBtn" onclick="startWorldbookCreate()">创建</button>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="worldbookImportBackdrop" onclick="closeWorldbookImportModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><div class="modal-title">导入世界书</div><button class="modal-close" onclick="closeWorldbookImportModal()">&times;</button></div>
    <div class="modal-body">
      <div class="upload-zone" id="worldbookUploadZone" onclick="document.getElementById('worldbookFileInput').click()">
        <input type="file" id="worldbookFileInput" accept=".json" multiple onchange="handleWorldbookFileSelect(event)">
        <div class="upload-icon">&#8682;</div>
        <div class="upload-text">点击选择或拖拽文件到此处</div>
        <div class="upload-hint">支持选择多个 .json 格式的世界书文件；导入后文件将保存到当前角色卡的 worldbooks 目录</div>
        <div class="upload-preview" id="worldbookUploadPreview"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeWorldbookImportModal()">取消</button>
      <button class="btn-primary" id="worldbookImportBtn" onclick="startWorldbookImport()" disabled>开始导入</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const $ = id => document.getElementById(id);
let currentCardId = '';
let currentWorldbook = null;
let allEntries = [];
let filteredEntries = [];
let currentPage = 1;
let pageSize = 25;

function toast(text, buttons) {
  const el = $('toast'); el.innerHTML = text;
  if (buttons && buttons.length) {
    el.innerHTML += ' ' + buttons.map(b => `<button data-action="${escAttr(b.action)}">${esc(b.label)}</button>`).join(' ');
    el.querySelectorAll('button').forEach(btn => { btn.onclick = () => { el.classList.remove('show'); }; });
  }
  el.classList.add('show');
  if (!buttons) setTimeout(() => el.classList.remove('show'), 2500);
}
function esc(s) { return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) }
function escAttr(s) { return String(s || '').replace(/['\\]/g, '\\$&').replace(/\n/g, ' ') }
async function api(path, opts) {
  const isFormData = typeof FormData !== 'undefined' && opts && opts.body instanceof FormData;
  const headers = isFormData ? {} : { 'Content-Type': 'application/json' };
  const res = await fetch(path, Object.assign({ headers }, opts || {}));
  const data = await res.json();
  if (!data.ok && data.error) throw new Error(data.error);
  return data;
}
function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return ts;
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function strategyLabel(e) {
  if (e.constant) return '<span class="strategy-dot constant"></span> 常驻';
  if (e.selective) return '<span class="strategy-dot selective"></span> 选择';
  return '<span class="strategy-dot normal"></span> 普通';
}
function positionLabel(v) {
  const map = {0:'在角色定义前',1:'在角色定义后',2:'在对话前',3:'在对话后',4:'在系统提示后'};
  return map[Number(v)] || String(v);
}

async function populateWorldbookCardSelector() {
  const select = $('worldbookCardSelect');
  if (!select) return;
  try {
    const data = await api('/api/resources/cards');
    const current = data.current || '';
    const cardList = data.cards || [];
    select.innerHTML = '<option value="">-- 选择角色卡 --</option>' + cardList.map(c => `<option value="${escAttr(c.id)}"${c.id === current ? ' selected' : ''}>${esc(c.name) || c.id}</option>`).join('');
    if (current) { select.value = current; await refreshWorldbooks(); }
  } catch (e) { select.innerHTML = '<option value="">-- 加载失败 --</option>'; }
}
async function onWorldbookCardChange(cardId) {
  currentCardId = cardId || '';
  if (!cardId) {
    $('worldbookGrid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">&#127758;</div><div class="empty-title">选择角色卡</div><div class="empty-desc">请先在上方选择一个角色卡，以管理其世界书文件。</div></div>`;
    $('worldbookCount').textContent = '共 0 个';
    $('worldbookView').style.display = 'none';
    return;
  }
  await refreshWorldbooks();
}
async function refreshWorldbooks() {
  const select = $('worldbookCardSelect');
  const cardId = select ? select.value : '';
  if (!cardId) {
    $('worldbookGrid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">&#127758;</div><div class="empty-title">选择角色卡</div><div class="empty-desc">请先在上方选择一个角色卡，以管理其世界书文件。</div></div>`;
    $('worldbookCount').textContent = '共 0 个'; return;
  }
  const grid = $('worldbookGrid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
  try {
    const data = await api(`/api/resources/worldbooks?cardId=${encodeURIComponent(cardId)}`);
    const wbs = data.worldbooks || [];
    renderWorldbooks(wbs);
    $('worldbookCount').textContent = `共 ${wbs.length} 个`;
  } catch (e) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-desc">加载失败: ${esc(e.message)}</div></div>`;
  }
}
function renderWorldbooks(list) {
  const grid = $('worldbookGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">&#127758;</div><div class="empty-title">暂无世界书</div><div class="empty-desc">点击"新建世界书"或"导入世界书"开始添加。</div></div>`;
    return;
  }
  grid.innerHTML = list.map(wb => {
    const sizeText = wb.size ? `${(wb.size / 1024).toFixed(1)} KB` : '-';
    const mtimeText = wb.updatedAt ? wb.updatedAt.replace('T', ' ').replace('Z', '') : '-';
    return `<div class="card-item">
      <div class="card-body">
        <div class="card-name" title="${esc(wb.name)}">&#128220; ${esc(wb.name)}</div>
        <div class="card-meta"><span class="badge">${wb.entries} 条词条</span><span class="stat">${sizeText}</span></div>
        <div class="card-meta" style="margin-top:4px">${esc(mtimeText)}</div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn" onclick="openWorldbook('${escAttr(wb.name)}')">&#128065; 查看</button>
          <button class="btn-danger" onclick="deleteWorldbook('${escAttr(wb.name)}', '${escAttr(wb.name)}')">&#128465; 删除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
async function openWorldbook(name) {
  currentWorldbook = name;
  $('worldbookGrid').style.display = 'none';
  $('worldbookView').style.display = 'block';
  $('wbTitle').textContent = name;
  try {
    const data = await api(`/api/worldbook?name=${encodeURIComponent(name)}&cardId=${encodeURIComponent(currentCardId)}`);
    allEntries = data.worldbook?.entries || [];
    $('wbMeta').textContent = `共 ${allEntries.length} 条词条 · 最后更新 ${formatTime(data.worldbook?.updatedAt || '')}`;
    onSearch();
  } catch (e) {
    toast('加载失败: ' + e.message);
  }
}
function onSearch() {
  const q = ($('entrySearch')?.value || '').trim().toLowerCase();
  const sort = $('sortSelect')?.value || 'order';
  pageSize = parseInt($('pageSize')?.value || '25', 10);
  let entries = allEntries.filter(e => {
    if (!q) return true;
    const text = `${e.comment || ''} ${e.content || ''} ${(e.key || []).join(' ')}`.toLowerCase();
    return text.includes(q);
  });
  entries.sort((a, b) => {
    if (sort === 'probability') return (b.probability || 0) - (a.probability || 0);
    if (sort === 'depth') return (a.depth || 0) - (b.depth || 0);
    return (a.order || 100) - (b.order || 100);
  });
  filteredEntries = entries;
  currentPage = 1;
  renderEntries();
}
function changePage(delta) {
  const maxPage = Math.max(1, Math.ceil(filteredEntries.length / pageSize));
  currentPage = Math.min(maxPage, Math.max(1, currentPage + delta));
  renderEntries();
}
function renderEntries() {
  const tbody = $('entryTableBody');
  const empty = $('entryEmpty');
  const maxPage = Math.max(1, Math.ceil(filteredEntries.length / pageSize));
  if (currentPage > maxPage) currentPage = maxPage;
  const start = (currentPage - 1) * pageSize;
  const page = filteredEntries.slice(start, start + pageSize);
  if (!filteredEntries.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = page.map((e, idx) => {
      const globalIdx = start + idx;
      const isConstant = !!e.constant;
      const isSelective = !!e.selective;
      const strategy = isConstant ? 'constant' : (isSelective ? 'selective' : 'normal');
      return `<tr data-uid="${e.uid ?? globalIdx}">
        <td class="row-toggle" onclick="toggleExpand(this)" title="展开/收起">&#9654;</td>
        <td><input type="checkbox" ${e.disable ? '' : 'checked'} onchange="toggleDisable(this, '${escAttr(String(e.uid ?? ''))}')" title="启用/禁用"></td>
        <td><input class="entry-input" value="${escAttr(e.comment || '')}" onchange="updateEntry('${escAttr(String(e.uid ?? ''))}', 'comment', this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>
        <td><select class="entry-select" onchange="updateStrategy('${escAttr(String(e.uid ?? ''))}', this.value)">
          <option value="normal" ${strategy==='normal'?'selected':''}>普通</option>
          <option value="constant" ${strategy==='constant'?'selected':''}>常驻</option>
          <option value="selective" ${strategy==='selective'?'selected':''}>选择</option>
        </select></td>
        <td><select class="entry-select" onchange="updateEntry('${escAttr(String(e.uid ?? ''))}', 'position', this.value)">
          ${[0,1,2,3,4].map(v=>`<option value="${v}" ${Number(e.position)===v?'selected':''}>${positionLabel(v)}</option>`).join('')}
        </select></td>
        <td><input class="entry-input" type="number" value="${escAttr(String(e.depth ?? 0))}" onchange="updateEntry('${escAttr(String(e.uid ?? ''))}', 'depth', this.value)"></td>
        <td><input class="entry-input" type="number" value="${escAttr(String(e.order ?? 100))}" onchange="updateEntry('${escAttr(String(e.uid ?? ''))}', 'order', this.value)"></td>
        <td><input class="entry-input" type="number" min="0" max="100" value="${escAttr(String(e.probability ?? 100))}" onchange="updateEntry('${escAttr(String(e.uid ?? ''))}', 'probability', this.value)"></td>
        <td><div class="row-actions">
          <button class="btn" onclick="duplicateEntry('${escAttr(String(e.uid ?? ''))}')" title="复制">&#128203;</button>
          <button class="btn-danger" onclick="deleteEntry('${escAttr(String(e.uid ?? ''))}', this)" title="删除">&#128465;</button>
        </div></td>
      </tr>
      <tr class="entry-expand" data-uid="${e.uid ?? globalIdx}" style="display:none">
        <td colspan="9">
          <div style="padding:0 10px 10px">
            <div class="entry-content-preview">
              <div class="content-label">内容</div>
              <textarea class="entry-textarea" onchange="updateEntry('${escAttr(String(e.uid ?? ''))}', 'content', this.value)">${esc(e.content || '')}</textarea>
            </div>
            <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap">
              <div style="flex:1;min-width:140px">
                <div class="content-label">关键词 (key)</div>
                <input class="entry-input" value="${escAttr((e.key || []).join(', '))}" onchange="updateEntry('${escAttr(String(e.uid ?? ''))}', 'key', this.value)">
              </div>
              <div style="flex:1;min-width:140px">
                <div class="content-label">次要关键词 (keysecondary)</div>
                <input class="entry-input" value="${escAttr((e.keysecondary || []).join(', '))}" onchange="updateEntry('${escAttr(String(e.uid ?? ''))}', 'keysecondary', this.value)">
              </div>
            </div>
          </div>
        </td>
      </tr>`;
    }).join('');
  }
  $('pageInfo').textContent = `${currentPage} / ${maxPage}`;
  $('prevPage').disabled = currentPage <= 1;
  $('nextPage').disabled = currentPage >= maxPage;
}
function toggleExpand(td) {
  const tr = td.parentElement;
  const uid = tr.getAttribute('data-uid');
  const next = tr.nextElementSibling;
  if (next && next.classList.contains('entry-expand')) {
    const open = next.style.display === 'none';
    next.style.display = open ? 'table-row' : 'none';
    td.innerHTML = open ? '&#9660;' : '&#9654;';
  }
}
async function saveEntry(uid, patch) {
  if (!currentWorldbook || !currentCardId) return;
  await api('/api/worldbook/entry', {
    method: 'POST',
    body: JSON.stringify({ cardId: currentCardId, name: currentWorldbook, entry: { uid: Number(uid), ...patch } })
  });
}
async function toggleDisable(input, uid) {
  const disabled = !input.checked;
  await saveEntry(uid, { disable: disabled });
  toast(disabled ? '已禁用' : '已启用');
}
async function updateEntry(uid, field, value) {
  const patch = { [field]: field === 'order' || field === 'depth' || field === 'position' || field === 'probability' ? Number(value) : value };
  if (field === 'key' || field === 'keysecondary') {
    patch[field] = String(value).split(',').map(s => s.trim()).filter(Boolean);
  }
  await saveEntry(uid, patch);
}
async function updateStrategy(uid, value) {
  const patch = { constant: value === 'constant', selective: value === 'selective' };
  await saveEntry(uid, patch);
  toast('策略已更新');
}
async function duplicateEntry(uid) {
  if (!currentWorldbook || !currentCardId) return;
  const entry = allEntries.find(e => String(e.uid) === String(uid));
  if (!entry) return;
  const newEntry = { ...entry, uid: undefined, comment: `${entry.comment || '词条'} (副本)`, order: (entry.order || 100) + 1 };
  await api('/api/worldbook/entry', {
    method: 'POST',
    body: JSON.stringify({ cardId: currentCardId, name: currentWorldbook, entry: newEntry })
  });
  toast('已复制词条');
  openWorldbook(currentWorldbook);
}
async function deleteEntry(uid, btn) {
  if (!confirm('确定删除该词条吗？')) return;
  const row = btn.closest('tr');
  row.style.opacity = '0.4';
  row.style.pointerEvents = 'none';
  try {
    await api('/api/worldbook/entry', {
      method: 'DELETE',
      body: JSON.stringify({ cardId: currentCardId, name: currentWorldbook, uid: Number(uid) })
    });
    toast('已删除');
    openWorldbook(currentWorldbook);
  } catch (e) {
    toast('删除失败: ' + e.message);
    row.style.opacity = '1';
    row.style.pointerEvents = 'auto';
  }
}
async function viewWorldbook(name) { openWorldbook(name); }
async function deleteWorldbook(id, name) {
  const select = $('worldbookCardSelect');
  const cardId = select ? select.value : '';
  if (!cardId) { toast('请先选择角色卡'); return; }
  if (!confirm(`确定删除世界书「${name}」吗？\n此操作不可恢复。`)) return;
  try { await api(`/api/worldbooks?cardId=${encodeURIComponent(cardId)}&name=${encodeURIComponent(name)}`, { method: 'DELETE' }); toast(`已删除「${name}」`); await refreshWorldbooks(); }
  catch (e) { toast('删除失败: ' + e.message); }
}
function openWorldbookCreateModal() {
  const select = $('worldbookCardSelect');
  if (!select || !select.value) { toast('请先选择角色卡'); return; }
  $('worldbookNameInput').value = ''; $('worldbookCreateBtn').disabled = false; $('worldbookCreateBtn').innerHTML = '创建';
  $('worldbookCreateBackdrop').classList.add('open'); setTimeout(() => $('worldbookNameInput').focus(), 50);
}
function closeWorldbookCreateModal() { $('worldbookCreateBackdrop').classList.remove('open'); }
async function startWorldbookCreate() {
  const select = $('worldbookCardSelect');
  const cardId = select ? select.value : '';
  const name = ($('worldbookNameInput').value || '').trim();
  if (!cardId) { toast('请先选择角色卡'); return; }
  if (!name) { toast('请输入世界书名称'); return; }
  const btn = $('worldbookCreateBtn'); btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>创建中...';
  try {
    const data = await api('/api/worldbooks', { method: 'POST', body: JSON.stringify({ cardId, name }) });
    toast(`已创建世界书「${data.worldbook.name}」`);
    closeWorldbookCreateModal(); await refreshWorldbooks();
  } catch (e) { toast('创建失败: ' + e.message); btn.disabled = false; btn.innerHTML = '创建'; }
}
function openWorldbookImportModal() {
  const select = $('worldbookCardSelect');
  if (!select || !select.value) { toast('请先选择角色卡'); return; }
  worldbookFiles = []; $('worldbookUploadPreview').innerHTML = ''; $('worldbookImportBtn').disabled = true;
  $('worldbookImportBackdrop').classList.add('open'); $('worldbookFileInput').value = '';
}
function closeWorldbookImportModal() { $('worldbookImportBackdrop').classList.remove('open'); }
let worldbookFiles = [];
function handleWorldbookFileSelect(event) {
  const files = Array.from(event.target.files || []);
  worldbookFiles = files.filter(f => f.name.toLowerCase().endsWith('.json'));
  updateWorldbookUploadPreview(); $('worldbookImportBtn').disabled = worldbookFiles.length === 0;
}
function updateWorldbookUploadPreview() {
  const container = $('worldbookUploadPreview');
  container.innerHTML = worldbookFiles.map((f, i) =>
    `<div class="upload-thumb"><img src="${URL.createObjectURL(f)}"><button class="remove" onclick="removeWorldbookFile(${i})">&times;</button></div>`
  ).join('');
}
function removeWorldbookFile(index) { worldbookFiles.splice(index, 1); updateWorldbookUploadPreview(); $('worldbookImportBtn').disabled = worldbookFiles.length === 0; }
async function startWorldbookImport() {
  if (!worldbookFiles.length) return;
  const select = $('worldbookCardSelect');
  const cardId = select ? select.value : '';
  if (!cardId) { toast('请先选择角色卡'); return; }
  const btn = $('worldbookImportBtn'); btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>导入中...';
  try {
    const form = new FormData(); worldbookFiles.forEach(f => form.append('file', f));
    const res = await fetch(`/api/worldbooks/import?cardId=${encodeURIComponent(cardId)}`, { method: 'POST', body: form });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '导入失败');
    toast(`成功导入 ${data.imported.length} 个世界书`);
    closeWorldbookImportModal(); await refreshWorldbooks();
  } catch (e) { toast('导入失败: ' + e.message); btn.disabled = false; btn.innerHTML = '开始导入'; }
}
const worldbookUploadZone = $('worldbookUploadZone');
if (worldbookUploadZone) {
  worldbookUploadZone.addEventListener('dragover', e => { e.preventDefault(); worldbookUploadZone.classList.add('dragover'); });
  worldbookUploadZone.addEventListener('dragleave', () => { worldbookUploadZone.classList.remove('dragover'); });
  worldbookUploadZone.addEventListener('drop', e => {
    e.preventDefault(); worldbookUploadZone.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.json'));
    if (files.length) { worldbookFiles = files; updateWorldbookUploadPreview(); $('worldbookImportBtn').disabled = false; }
  });
}
populateWorldbookCardSelector();
</script>
</body>

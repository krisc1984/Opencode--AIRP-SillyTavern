<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>预设管理 — OpenCode AIRP</title>
<style>
:root{
  --bg:#16110e;
  --panel:#1f1915;
  --panel-2:#2a221c;
  --text:#e8dcc8;
  --muted:#a89880;
  --line:#3d3228;
  --gold:#d4a574;
  --gold-2:#c49a6c;
  --brand:#e8b86d;
  --brand-2:#3d2e1a;
  --danger:#c45c5c;
  --bubble:#2a221c;
  --shadow:0 12px 36px rgba(0,0,0,.35);
  --width:980px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font:14px/1.55 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;
  min-height:100vh;
}
button,input,select,textarea{font:inherit;color:inherit}
button{touch-action:manipulation;cursor:pointer}
.top{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;
  background:linear-gradient(180deg, rgba(212,165,116,.08), transparent);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(8px);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:28px;height:28px;border-radius:6px;
  background:linear-gradient(135deg, var(--gold), var(--gold-2));
  display:flex;align-items:center;justify-content:center;
  color:#1a1614;font-weight:900;font-size:14px;
}
.brand-text{font-weight:700;font-size:15px;color:var(--gold);letter-spacing:.3px}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px}
.spacer{flex:1}
.icon-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--line);
  background:var(--panel);color:var(--text);display:inline-flex;align-items:center;justify-content:center;
  text-decoration:none;transition:all .15s;
}
.icon-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--panel-2)}
.container{
  max-width:min(100vw,var(--width));margin:0 auto;padding:18px;
  display:flex;flex-direction:column;gap:14px;
}
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:10px;
  box-shadow:var(--shadow);overflow:hidden;
}
.card-head{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(212,165,116,.06), transparent);
}
.card-title{font-weight:700;font-size:14px;color:var(--gold);display:flex;align-items:center;gap:8px}
.card-meta{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}
.card-body{padding:14px 16px}
.empty{padding:24px;color:var(--muted);text-align:center;font-size:13px}
.row{display:flex;gap:10px;align-items:center}
.row>*{flex:1}
.gold-btn{
  border:none;background:linear-gradient(135deg, var(--gold), var(--gold-2));
  color:#1a1614;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer;
  transition:all .15s;border:1px solid var(--gold);
}
.gold-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.gold-btn:active{transform:translateY(0)}
.gold-btn.secondary{
  background:transparent;color:var(--gold);border:1px solid var(--line);
}
.gold-btn.secondary:hover{border-color:var(--gold);background:var(--panel-2)}
.danger-btn{
  border:1px solid var(--danger);background:transparent;color:var(--danger);
  border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;
}
.danger-btn:hover{background:rgba(196,92,92,.1)}
select{
  width:100%;border:1px solid var(--line);border-radius:8px;background:var(--panel-2);
  color:var(--text);padding:8px 10px;outline:none;cursor:pointer;
}
select:focus{border-color:var(--gold)}
.preset-name{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--text)}
.preset-info{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
.preset-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--panel);border:1px solid var(--line);border-radius:999px;
  padding:2px 8px;font-size:11px;color:var(--muted);
}
.preset-badge.on{color:var(--gold);border-color:rgba(212,165,116,.3)}
.entries-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.entries-title{font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.entry-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:6px;transition:background .12s;
}
.entry-row:hover{background:var(--panel)}
.entry-id{font-size:11px;color:var(--muted);font-family:monospace;min-width:90px;flex-shrink:0}
.entry-name{font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-role{
  font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:4px;
  padding:2px 6px;white-space:nowrap;
}
.entry-content{
  font-size:12px;color:var(--muted);flex:2;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.toggle{
  position:relative;display:inline-block;width:38px;height:20px;flex-shrink:0;
}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.slider{
  position:absolute;cursor:pointer;inset:0;background:var(--line);
  transition:.18s;border-radius:999px;
}
.slider:before{
  position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;
  background:var(--text);transition:.18s;border-radius:50%;
}
input:checked + .slider{background:var(--gold)}
input:checked + .slider:before{transform:translateX(18px);background:#1a1614}
input:disabled + .slider{opacity:.5;cursor:not-allowed}
.order-badge{
  font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--line);
  border-radius:4px;padding:2px 8px;min-width:32px;text-align:center;
}
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:60;
  background:var(--panel-2);color:var(--gold);border:1px solid var(--gold);
  border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow);opacity:0;transition:opacity .2s;pointer-events:none;
}
.toast.show{opacity:1}
@media (max-width:760px){
  .container{padding:12px}
  .entry-content{display:none}
  .entry-id{min-width:70px;font-size:10px}
}
</style>
</head>
<body>
<div class="top">
  <a class="icon-btn" href="/" title="返回聊天">←</a>
  <div class="brand">
    <div class="brand-icon">⚙</div>
    <div>
      <div class="brand-text">预设管理</div>
      <div class="brand-sub">Preset Manager</div>
    </div>
  </div>
  <span class="spacer"></span>
  <button class="icon-btn" onclick="toggleTheme()" title="明暗主题">◐</button>
</div>

<div class="container">
  <div class="card">
    <div class="card-head">
      <div class="card-title">📋 活动预设</div>
      <div class="card-meta" id="activeMeta">加载中...</div>
    </div>
    <div class="card-body">
      <div class="row">
        <select id="activePreset"><option value="">未选择</option></select>
        <button class="gold-btn" style="flex:0 0 auto" onclick="selectActive()">应用预设</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <div class="card-title">📁 预设详情</div>
      <div class="card-meta" id="detailMeta">选择一个预设</div>
      <span class="spacer"></span>
      <button class="gold-btn secondary" onclick="refresh()">刷新</button>
    </div>
    <div class="card-body">
      <div class="row" style="margin-bottom:12px">
        <select id="detailPreset" onchange="onDetailPresetChanged()"><option value="">请选择预设</option></select>
      </div>
      <div id="presetDetail">
        <div class="empty">请选择预设以查看详情</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
let allPresets=[];
let activePresetId='';
let presetEntriesMap={};

function toast(text){
  const el=$('toast');
  el.textContent=text;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]))}
function escAttr(s){return String(s??'').replace(/[&<>"'\n]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;','\n':' '}[c]))}

async function api(path,opts){
  const res=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'}},opts||{}));
  const data=await res.json();
  if(!data.ok && data.error) throw new Error(data.error);
  return data;
}

function toggleTheme(){
  document.body.dataset.theme=document.body.dataset.theme==='dark'?'light':'dark';
  localStorage.setItem('airp.presetTheme',document.body.dataset.theme);
}

async function loadActive(){
  const data=await api('/api/presets');
  activePresetId=data.activePresetId||'';
  $('activeMeta').textContent=activePresetId||'未选择';
  const sel=$('activePreset');
  sel.innerHTML='<option value="">未选择</option>'+
    Object.keys(data.presets||{}).map(id=>`<option value="${escAttr(id)}">${escAttr(id)}</option>`).join('');
  sel.value=activePresetId;
}

async function selectActive(){
  const id=$('activePreset').value;
  if(!id){toast('请先选择预设');return;}
  await api('/api/presets/select',{method:'POST',body:JSON.stringify({presetId:id})});
  activePresetId=id;
  $('activeMeta').textContent=id;
  toast('活动预设已更新');
}

async function loadScan(){
  const data=await api('/api/presets/scan');
  allPresets=data.presets||[];
  presetEntriesMap={};
  allPresets.forEach(p=>{
    presetEntriesMap[p.name]=p.entries||[];
  });
  const sel=$('detailPreset');
  sel.innerHTML='<option value="">请选择预设</option>'+
    allPresets.map(p=>`<option value="${escAttr(p.name)}">${escAttr(p.name)} (${(p.entries||[]).length})</option>`).join('');
}

function onDetailPresetChanged(){
  const name=$('detailPreset').value;
  if(!name){
    $('presetDetail').innerHTML='<div class="empty">请选择预设以查看详情</div>';
    $('detailMeta').textContent='选择一个预设';
    return;
  }
  const entries=presetEntriesMap[name]||[];
  const enabledCount=entries.filter(e=>e.enabled).length;
  $('detailMeta').textContent=`${name} · ${entries.length} 条目 · ${enabledCount} 启用`;
  if(!entries.length){
    $('presetDetail').innerHTML='<div class="empty">该预设下没有条目</div>';
    return;
  }
  $('presetDetail').innerHTML=`<div class="entries-section">
    <div class="entries-title">预设条目</div>
    ${entries.map((e,idx)=>{
      const checked=' checked';  // default enabled in UI
      return `<div class="entry-row">
        <span class="entry-id">${idx+1}</span>
        <span class="entry-name" title="${escAttr(e.name)}">${esc(e.name)}</span>
        <span class="entry-role">${esc(e.role)}</span>
        <span class="entry-content" title="${escAttr(e.content)}">${esc(e.content)}</span>
        <span class="order-badge">#${e.injection_order||100}</span>
        <label class="toggle" title="点击切换启用/禁用">
          <input type="checkbox" ${checked} data-id="${escAttr(e.id)}" data-preset="${escAttr(name)}" onchange="toggleEntry(this)">
          <span class="slider"></span>
        </label>
      </div>`;
    }).join('')}
  </div>`;
}

async function toggleEntry(input){
  const id=input.dataset.id;
  const preset=input.dataset.preset;
  const enabled=input.checked;
  try{
    await api('/api/presets/toggle',{method:'POST',body:JSON.stringify({presetId:preset,entryId:id,enabled})});
    toast(enabled?'已启用':'已禁用');
    // Update scan cache
    const entry=presetEntriesMap[preset]?.find(e=>e.id===id);
    if(entry) entry.enabled=enabled;
    onDetailPresetChanged();
  }catch(e){
    toast(e.message);
    input.checked=!enabled;
  }
}

async function refresh(){
  await Promise.all([loadActive(), loadScan()]);
  toast('已刷新');
}

async function boot(){
  const saved=localStorage.getItem('airp.presetTheme');
  if(saved) document.body.dataset.theme=saved;
  else document.body.dataset.theme='dark';
  await Promise.all([loadActive(), loadScan()]);
}

boot().catch(e=>toast(e.message));
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>资源管理 - OpenCode AIRP</title>
<style>
:root{
  --bg:#16110e;--panel:#1f1915;--panel-2:#2a221c;--text:#e8dcc8;--muted:#a89880;
  --line:#3d3228;--gold:#d4a574;--gold-2:#c49a6c;--brand:#e8b86d;--brand-2:#3d2e1a;
  --danger:#c45c5c;--shadow:0 12px 36px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.55 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;min-height:100vh}
button,input,select,textarea{font:inherit;color:inherit}
button{touch-action:manipulation;cursor:pointer}
.top{
  display:flex;align-items:center;gap:12px;padding:14px 20px;
  background:linear-gradient(180deg, rgba(212,165,116,.08), transparent);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;backdrop-filter:blur(8px);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg, var(--gold), var(--gold-2));display:flex;align-items:center;justify-content:center;color:#1a1614;font-weight:900;font-size:14px}
.brand-text{font-weight:700;font-size:15px;color:var(--gold);letter-spacing:.3px}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px}
.spacer{flex:1}
.icon-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--text);
  display:inline-flex;align-items:center;justify-content:center;text-decoration:none;transition:all .15s;font-size:13px;
}
.icon-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--panel-2)}
.container{max-width:800px;margin:0 auto;padding:40px 20px}
.page-title{font-size:28px;font-weight:800;color:var(--gold);margin-bottom:8px;letter-spacing:.3px}
.page-desc{font-size:14px;color:var(--muted);margin-bottom:32px}
.nav-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:14px}
.nav-card{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 16px;
  text-decoration:none;color:var(--text);transition:all .15s;display:flex;flex-direction:column;gap:8px;
}
.nav-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow)}
.nav-card-icon{font-size:28px;opacity:.8}
.nav-card-title{font-size:15px;font-weight:700;color:var(--text)}
.nav-card-desc{font-size:12px;color:var(--muted);line-height:1.5}
.nav-card-arrow{margin-left:auto;font-size:18px;color:var(--gold);opacity:0;transition:all .15s}
.nav-card:hover .nav-card-arrow{opacity:1;transform:translateX(4px)}
</style>
</head>
<body>
<div class="top">
  <div class="brand">
    <div class="brand-icon">AIRP</div>
    <div>
      <div class="brand-text">OpenCode AIRP SillyTavern</div>
      <div class="brand-sub">资源管理</div>
    </div>
  </div>
  <span class="spacer"></span>
  <a class="icon-btn" href="/index.html" title="返回对话">&#8592;</a>
</div>
<div class="container">
  <div class="page-title">资源管理</div>
  <div class="page-desc">选择一个管理页面进入，每个功能已拆分为独立页面。</div>
  <div class="nav-grid">
    <a class="nav-card" href="/cards.html">
      <div class="nav-card-icon">&#128100;</div>
      <div class="nav-card-title">角色卡</div>
      <div class="nav-card-desc">导入、查看、进入和删除角色卡。</div>
      <div class="nav-card-arrow">&#8594;</div>
    </a>
    <a class="nav-card" href="/worldbooks.html">
      <div class="nav-card-icon">&#127758;</div>
      <div class="nav-card-title">世界书</div>
      <div class="nav-card-desc">按角色卡管理世界书文件，支持新建、导入、查看和删除。</div>
      <div class="nav-card-arrow">&#8594;</div>
    </a>
    <a class="nav-card" href="/history.html">
      <div class="nav-card-icon">&#128197;</div>
      <div class="nav-card-title">对话历史</div>
      <div class="nav-card-desc">对话历史与角色卡绑定，可在角色卡详情中查看和管理。</div>
      <div class="nav-card-arrow">&#8594;</div>
    </a>
    <a class="nav-card" href="/presets.html">
      <div class="nav-card-icon">&#128396;</div>
      <div class="nav-card-title">预设</div>
      <div class="nav-card-desc">预设系统正在开发中，敬请期待。</div>
      <div class="nav-card-arrow">&#8594;</div>
    </a>
    <a class="nav-card" href="/regex.html">
      <div class="nav-card-icon">&#10070;</div>
      <div class="nav-card-title">正则</div>
      <div class="nav-card-desc">导入和管理正则替换规则，支持启用/禁用、编辑和删除。</div>
      <div class="nav-card-arrow">&#8594;</div>
    </a>
    <a class="nav-card" href="/builtin-cards.html">
      <div class="nav-card-icon">&#128188;</div>
      <div class="nav-card-title">内置角色卡</div>
      <div class="nav-card-desc">内置角色卡功能正在开发中，敬请期待。</div>
      <div class="nav-card-arrow">&#8594;</div>
    </a>
    <a class="nav-card" href="/builtin-presets.html">
      <div class="nav-card-icon">&#128295;</div>
      <div class="nav-card-title">内置预设</div>
      <div class="nav-card-desc">内置预设功能正在开发中，敬请期待。</div>
      <div class="nav-card-arrow">&#8594;</div>
    </a>
  </div>
</div>
</body>
</html>

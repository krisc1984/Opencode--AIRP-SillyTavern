<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenCode AIRP SillyTavern</title>
<style>
:root{
  --bg:#eef0f3;
  --panel:#fff;
  --text:#1f2328;
  --muted:#737b86;
  --line:#d9dee7;
  --brand:#1f8f6a;
  --brand-2:#d9f3e8;
  --danger:#b42318;
  --bubble:#fff;
  --self:#c9f4a7;
  --shadow:0 12px 36px rgba(31,35,40,.10);
  --width:980px;
}
[data-theme=dark]{
  --bg:#14171b;
  --panel:#1f242b;
  --text:#edf1f5;
  --muted:#9aa4b2;
  --line:#303844;
  --brand:#42c99a;
  --brand-2:#17382c;
  --danger:#ff8a7a;
  --bubble:#262c34;
  --self:#135c45;
  --shadow:none;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font:14px/1.55 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;
  height:100vh;
  overflow:hidden;
}
button,input,select,textarea{font:inherit}
button{touch-action:manipulation}
.app{
  position:relative;
  height:100vh;
  width:min(100vw,var(--width));
  margin:0 auto;
  display:grid;
  grid-template-rows:52px minmax(0,1fr) auto auto;
  border-left:1px solid var(--line);
  border-right:1px solid var(--line);
  background:var(--bg);
}
.top{
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 14px;
  background:var(--panel);
  border-bottom:1px solid var(--line);
  min-width:0;
}
.title{
  font-weight:700;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.top select{
  min-width:150px;
  max-width:260px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--bg);
  color:var(--text);
  padding:6px 8px;
}
.pill{
  font-size:12px;
  color:var(--muted);
  border:1px solid var(--line);
  border-radius:999px;
  padding:3px 8px;
  white-space:nowrap;
}
.spacer{flex:1}
.icon{
  width:34px;
  height:34px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel);
  color:var(--text);
  cursor:pointer;
}
.icon:hover{border-color:var(--brand)}
.main{min-height:0;display:grid;grid-template-columns:1fr}
.chat{
  padding:18px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:14px;
  scroll-behavior:smooth;
}
.msg-row{display:flex;gap:10px;align-items:flex-start}
.msg-row.self{justify-content:flex-end}
.avatar{
  width:36px;
  height:36px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--brand-2);
  color:var(--brand);
  font-weight:700;
  border:1px solid var(--line);
  flex:0 0 auto;
}
.msg-wrap{max-width:min(760px,78%)}
.msg{
  padding:10px 12px;
  border-radius:8px;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  box-shadow:var(--shadow);
}
.msg.other{background:var(--bubble)}
.msg.self{background:var(--self);box-shadow:none}
.msg-time{font-size:11px;color:var(--muted);margin-top:4px}
.gen-btn{
  margin-top:10px;
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--brand);
  border-radius:8px;
  padding:8px 10px;
  cursor:pointer;
}
.gen-btn.loading{color:var(--muted);cursor:wait}
.gen-img-wrap{margin-top:10px}
.gen-img{
  display:block;
  max-width:280px;
  max-height:360px;
  border-radius:8px;
  border:1px solid var(--line);
}
.status{
  padding:7px 14px;
  background:var(--panel);
  border-top:1px solid var(--line);
  color:var(--muted);
  font-size:12px;
  display:flex;
  gap:10px;
  align-items:center;
}
.composer{
  padding:10px;
  background:var(--panel);
  border-top:1px solid var(--line);
}
.composer textarea{
  width:100%;
  min-height:54px;
  max-height:150px;
  resize:vertical;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--bg);
  color:var(--text);
  padding:10px;
}
.composer-tools{display:flex;align-items:center;gap:8px;margin-top:8px}
.options{display:flex;gap:8px;overflow:auto;padding-bottom:2px}
.options button{
  white-space:nowrap;
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--text);
  border-radius:999px;
  padding:6px 10px;
  cursor:pointer;
}
.primary{
  border:none;
  background:var(--brand);
  color:white;
  border-radius:8px;
  padding:9px 12px;
  cursor:pointer;
}
.secondary{
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--text);
  border-radius:8px;
  padding:9px 12px;
  cursor:pointer;
}
.empty{margin:auto;color:var(--muted)}
.hidden{display:none}
.backdrop{
  position:fixed;
  inset:0;
  z-index:30;
  background:rgba(15,18,22,.38);
  opacity:0;
  pointer-events:none;
  transition:opacity .18s ease;
}
.backdrop.open{opacity:1;pointer-events:auto}
.side{
  position:fixed;
  top:0;
  right:0;
  z-index:40;
  width:min(380px,92vw);
  height:100dvh;
  border-left:1px solid var(--line);
  background:var(--panel);
  box-shadow:var(--shadow);
  padding:14px;
  overflow:auto;
  transform:translateX(102%);
  transition:transform .2s ease;
}
.side.open{transform:translateX(0)}
.side-head{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}
.side-title{font-size:16px;font-weight:700}
.side details{
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel);
  margin-bottom:10px;
  overflow:hidden;
}
.side summary{
  cursor:pointer;
  padding:10px;
  font-weight:700;
  list-style:none;
  border-bottom:1px solid transparent;
}
.side summary::-webkit-details-marker{display:none}
.side details[open] summary{border-bottom-color:var(--line)}
.section-body{padding:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.field input,.field select,.field textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--bg);
  color:var(--text);
  padding:8px;
}
.field textarea{min-height:82px;resize:vertical}
.row{display:flex;gap:8px}
.row>*{flex:1}
#context{
  white-space:pre-wrap;
  color:var(--muted);
  font-size:12px;
  margin:0;
  max-height:280px;
  overflow:auto;
}
.resize-handle{
  position:absolute;
  top:0;
  right:-5px;
  bottom:0;
  width:10px;
  cursor:ew-resize;
  z-index:25;
}
.resize-handle::after{
  content:"";
  position:absolute;
  top:45%;
  left:4px;
  width:2px;
  height:84px;
  border-radius:2px;
  background:var(--line);
}
.resize-handle:hover::after,.resizing .resize-handle::after{background:var(--brand)}
.resizing{user-select:none;cursor:ew-resize}
@media (max-width:760px){
  .app{width:100vw;border:0}
  .top{gap:8px;padding:0 10px}
  .top select{min-width:110px;max-width:150px}
  .pill{display:none}
  .chat{padding:14px 10px}
  .msg-wrap{max-width:82%}
  .resize-handle{display:none}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="top">
    <div class="title" id="title">OpenCode AIRP</div>
    <select id="cardSelect" title="切换角色卡"></select>
    <span class="pill" id="health">启动中</span>
    <span class="pill" id="messageCount">0 条消息</span>
    <span class="spacer"></span>
    <button class="icon" onclick="reroll()" title="重新生成">↻</button>
    <button class="icon" onclick="toggleTheme()" title="明暗主题">◐</button>
    <button class="icon" onclick="toggleSide()" title="角色卡与设置">☰</button>
  </div>
  <div class="main">
    <div class="chat" id="chat"><div class="empty">正在载入...</div></div>
  </div>
  <div class="status"><span id="status">待机</span><span class="spacer"></span><span id="queue">生图队列: 0</span></div>
  <div class="composer">
    <div class="options" id="options"></div>
    <textarea id="input" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
    <div class="composer-tools"><span class="spacer"></span><button class="primary" id="sendBtn" onclick="send()">发送</button></div>
  </div>
  <div class="resize-handle" id="resizeHandle" title="拖拽调整聊天宽度"></div>
</div>

<div id="sideBackdrop" class="backdrop" onclick="closeSide()"></div>
<aside class="side" id="side" aria-hidden="true">
  <div class="side-head">
    <div class="side-title">角色卡与设置</div>
    <span class="spacer"></span>
    <button class="icon" onclick="closeSide()" title="关闭">×</button>
  </div>

  <details open>
    <summary>当前角色</summary>
    <div class="section-body">
      <div class="field"><label>角色名</label><input id="cardName"></div>
      <div class="field"><label>标签</label><input id="cardTags"></div>
      <div class="field"><label>描述</label><textarea id="cardDesc"></textarea></div>
      <div class="field"><label>性格</label><textarea id="cardPersonality"></textarea></div>
      <div class="field"><label>场景</label><textarea id="cardScenario"></textarea></div>
      <div class="row"><button class="primary" onclick="saveCard()">保存角色卡</button><button class="secondary" onclick="loadCard()">重载</button></div>
    </div>
  </details>

  <details>
    <summary>开场白</summary>
    <div class="section-body">
      <div class="field"><label>选择开场</label><select id="openingSelect"></select></div>
      <button class="secondary" onclick="switchOpening()">应用开场</button>
    </div>
  </details>

  <details>
    <summary>聊天设置</summary>
    <div class="section-body">
      <div class="row">
        <div class="field"><label>文风</label><select id="style"><option value="default">default</option><option value="mode-a">mode-a</option><option value="mode-b">mode-b</option><option value="北棱特调">北棱特调</option><option value="轻松活泼">轻松活泼</option></select></div>
        <div class="field"><label>NSFW</label><select id="nsfw"><option value="off">关闭</option><option value="mild">舒缓</option><option value="direct">直白</option></select></div>
      </div>
      <div class="row">
        <div class="field"><label>人称</label><select id="person"><option value="first">第一人称</option><option value="second">第二人称</option><option value="third">第三人称</option></select></div>
        <div class="field"><label>字数</label><input id="wordCount" type="number" min="200" max="2000" step="100"></div>
      </div>
      <div class="field"><label>用户名</label><input id="userName"></div>
      <div class="row"><button class="primary" onclick="saveSettings()">保存设置</button><button class="secondary" onclick="resetChatWidth()">重置宽度</button></div>
    </div>
  </details>

  <details>
    <summary>上下文 / 调试</summary>
    <div class="section-body">
      <button class="secondary" onclick="loadContext()">刷新状态</button>
      <pre id="context"></pre>
    </div>
  </details>
</aside>

<script>
const $=id=>document.getElementById(id);
let waiting=false,lastMessages=-1,currentCard="";
const WIDTH_MIN=420, WIDTH_MAX=1280, WIDTH_DEFAULT=980;

async function api(path,opts){
  const res=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'}},opts||{}));
  const data=await res.json();
  if(!data.ok && data.error) throw new Error(data.error);
  return data;
}
function setStatus(text){$('status').textContent=text}

function openSide(){
  $('side').classList.add('open');
  $('sideBackdrop').classList.add('open');
  $('side').setAttribute('aria-hidden','false');
  localStorage.setItem('airp.sideOpen','1');
}
function closeSide(){
  $('side').classList.remove('open');
  $('sideBackdrop').classList.remove('open');
  $('side').setAttribute('aria-hidden','true');
  localStorage.setItem('airp.sideOpen','0');
}
function toggleSide(){
  if($('side').classList.contains('open')) closeSide();
  else openSide();
}
function toggleTheme(){
  document.body.dataset.theme=document.body.dataset.theme==='dark'?'light':'dark';
  localStorage.setItem('airp.theme',document.body.dataset.theme);
  saveSettings({theme:document.body.dataset.theme}).catch(()=>{});
}

function clamp(value,min,max){return Math.max(min,Math.min(max,value))}
function setChatWidth(width,persist){
  const next=clamp(Math.round(width),WIDTH_MIN,WIDTH_MAX);
  document.documentElement.style.setProperty('--width',next+'px');
  if(persist){
    localStorage.setItem('airp.chatWidth',String(next));
    saveSettings({pageWidth:next}).catch(()=>{});
  }
}
function resetChatWidth(){setChatWidth(WIDTH_DEFAULT,true);setStatus('聊天宽度已重置')}
function initResizeHandle(){
  const handle=$('resizeHandle');
  let dragging=false;
  handle.addEventListener('pointerdown',event=>{
    if(window.innerWidth<=760) return;
    dragging=true;
    handle.setPointerCapture(event.pointerId);
    document.body.classList.add('resizing');
    event.preventDefault();
  });
  handle.addEventListener('pointermove',event=>{
    if(!dragging) return;
    const width=Math.abs(event.clientX-window.innerWidth/2)*2;
    setChatWidth(width,false);
  });
  function finish(event){
    if(!dragging) return;
    dragging=false;
    document.body.classList.remove('resizing');
    const current=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--width'),10)||WIDTH_DEFAULT;
    setChatWidth(current,true);
    try{handle.releasePointerCapture(event.pointerId)}catch(e){}
  }
  handle.addEventListener('pointerup',finish);
  handle.addEventListener('pointercancel',finish);
}

async function loadHealth(){
  try{
    const h=await api('/api/health');
    $('health').textContent='OpenCode:'+h.opencodePort;
    currentCard=h.card||currentCard;
  }catch(e){
    $('health').textContent='离线';
  }
}
async function loadCards(){
  const data=await api('/api/cards');
  currentCard=data.current||'';
  $('cardSelect').innerHTML=(data.cards||[]).map(c=>`<option value="${esc(c.id)}">${esc(c.name||c.id)}${c.active?' · 当前':''}</option>`).join('');
  $('cardSelect').value=currentCard;
}
async function play(card){
  if(!card)return;
  await api('/api/play',{method:'POST',body:JSON.stringify({card})});
  lastMessages=-1;
  await boot();
}
$('cardSelect').addEventListener('change',e=>play(e.target.value));

async function loadCard(){
  const data=await api('/api/card');
  const f=data.card.fields||{};
  $('title').textContent=f.name||data.card.id||'OpenCode AIRP';
  $('cardName').value=f.name||'';
  $('cardTags').value=Array.isArray(f.tags)?f.tags.join(', '):(f.tags||'');
  $('cardDesc').value=f.description||'';
  $('cardPersonality').value=f.personality||'';
  $('cardScenario').value=f.scenario||'';
}
async function saveCard(){
  await api('/api/card',{method:'POST',body:JSON.stringify({id:currentCard,fields:{
    name:$('cardName').value,
    tags:$('cardTags').value,
    description:$('cardDesc').value,
    personality:$('cardPersonality').value,
    scenario:$('cardScenario').value
  }})});
  setStatus('角色卡已保存');
  await loadCards();
  await loadCard();
}
async function loadOpenings(){
  const data=await api('/api/openings');
  $('openingSelect').innerHTML=(data.openings||[]).map(o=>`<option value="${o.id}">${esc(o.label||('开场 '+o.id))}</option>`).join('');
}
async function switchOpening(){
  await api('/api/switch-opening',{method:'POST',body:JSON.stringify({id:$('openingSelect').value})});
  lastMessages=-1;
  await loadContent(true);
  setStatus('开场白已应用');
}
async function loadSettings(){
  const s=await api('/api/settings');
  for(const id of ['style','nsfw','person','wordCount','userName']){
    if($(id)&&s[id]!=null) $(id).value=s[id];
  }
  const savedTheme=localStorage.getItem('airp.theme')||s.theme;
  if(savedTheme) document.body.dataset.theme=savedTheme;
  const savedWidth=Number(localStorage.getItem('airp.chatWidth')||s.pageWidth||WIDTH_DEFAULT);
  setChatWidth(savedWidth,false);
}
async function saveSettings(extra){
  const body=Object.assign({
    style:$('style').value,
    nsfw:$('nsfw').value,
    person:$('person').value,
    wordCount:Number($('wordCount').value||600),
    userName:$('userName').value
  },extra||{});
  await api('/api/settings',{method:'POST',body:JSON.stringify(body)});
  setStatus('设置已保存');
}
async function loadContent(force){
  const data=await api('/api/content?t='+Date.now());
  if(!force && data.messages===lastMessages)return;
  lastMessages=data.messages;
  $('messageCount').textContent=(data.messages||0)+' 条消息';
  $('chat').innerHTML=data.html||'<div class="empty">选择角色卡后输入消息开始。</div>';
  $('options').innerHTML=(data.options||[]).map(o=>`<button onclick="pick('${escAttr(o)}')">${esc(o)}</button>`).join('');
  $('chat').scrollTop=$('chat').scrollHeight;
}
async function loadContext(){
  try{
    const data=await api('/api/context');
    const lore=(data.context.activatedLore||[]).map(x=>'- '+(x.title||x.comment||x.keyword)).join('\n');
    $('context').textContent=[
      '角色: '+(data.context.cardName||data.context.cardId||'-'),
      '阶段: '+(data.context.phase||'-'),
      '历史: '+((data.context.history||[]).length),
      '世界书命中:',
      lore||'-'
    ].join('\n');
  }catch(e){
    $('context').textContent=e.message;
  }
}
async function send(){
  const text=$('input').value.trim();
  if(!text||waiting)return;
  $('input').value='';
  waiting=true;
  $('sendBtn').disabled=true;
  setStatus('AI 思考中...');
  try{
    await api('/api/submit',{method:'POST',body:JSON.stringify({text})});
    pollReply();
  }catch(e){
    setStatus(e.message);
    waiting=false;
    $('sendBtn').disabled=false;
  }
}
function pollReply(){
  let tries=0;
  const timer=setInterval(async()=>{
    tries++;
    try{
      await loadContent(false);
      if(tries>2){
        const p=await api('/api/pending');
        if(!p.pending&&lastMessages>=0){
          clearInterval(timer);
          waiting=false;
          $('sendBtn').disabled=false;
          setStatus('待机');
          loadContext();
        }
      }
    }catch(e){
      clearInterval(timer);
      waiting=false;
      $('sendBtn').disabled=false;
      setStatus(e.message);
    }
    if(tries>240){
      clearInterval(timer);
      waiting=false;
      $('sendBtn').disabled=false;
      setStatus('等待超时');
    }
  },1500);
}
async function reroll(){
  waiting=true;
  $('sendBtn').disabled=true;
  setStatus('重新生成中...');
  await api('/api/reroll',{method:'POST',body:'{}'});
  pollReply();
}
function pick(text){$('input').value=text;send()}
$('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});

async function genImgPrompt(btn){
  const key=btn.dataset.key,tags=btn.dataset.tags;
  btn.disabled=true;
  btn.classList.add('loading');
  btn.textContent='排队中...';
  try{
    const data=await api('/api/image-gen',{method:'POST',body:JSON.stringify({key,tags})});
    pollImage(key,data.jobId,btn);
  }catch(e){
    btn.disabled=false;
    btn.classList.remove('loading');
    btn.textContent='生成失败，点击重试';
    btn.title=e.message;
  }
}
function pollImage(key,jobId,btn){
  const timer=setInterval(async()=>{
    try{
      const data=await api('/api/image-status?id='+encodeURIComponent(jobId));
      const job=data.job;
      if(job.status==='queued'||job.status==='running'){
        btn.textContent=job.status==='queued'?'排队中...':'生成中...';
        return;
      }
      clearInterval(timer);
      btn.classList.remove('loading');
      if(job.status==='done'){
        const wrap=$('img-'+key);
        if(wrap)wrap.innerHTML=`<img class="gen-img" src="/api/image?path=${job.path}" loading="lazy">`;
        btn.classList.add('hidden');
        setStatus('图片已生成');
        await loadContent(true);
      }else{
        btn.disabled=false;
        btn.textContent='生成失败，点击重试';
        btn.title=job.error||'生成失败';
      }
    }catch(e){
      clearInterval(timer);
      btn.disabled=false;
      btn.classList.remove('loading');
      btn.textContent='生成失败，点击重试';
      btn.title=e.message;
    }
  },1500);
}
async function loadQueue(){
  try{
    const data=await api('/api/image-status');
    const jobs=Object.values(data.jobs||{});
    $('queue').textContent='生图队列: '+jobs.filter(j=>j.status==='queued'||j.status==='running').length;
  }catch(e){}
}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function escAttr(s){return String(s||'').replace(/['\\]/g,'\\$&').replace(/\n/g,' ')}
async function boot(){
  await loadHealth();
  await loadCards();
  await loadCard();
  await loadOpenings();
  await loadSettings();
  await loadContent(true);
  await loadContext();
  setStatus('待机');
}
function initChrome(){
  initResizeHandle();
  if(localStorage.getItem('airp.sideOpen')==='1') openSide();
}
setInterval(()=>{if(!waiting)loadContent(false).catch(()=>{});loadQueue();},4000);
initChrome();
boot().catch(e=>setStatus(e.message));
